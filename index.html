<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0c0c;--sidebar:#110f0f;--surface:#1a1717;--surface2:#221e1e;--surface3:#2d2828;
  --bg:#0d0c0c;--sidebar:rgba(17, 15, 15, 0.85);--surface:#1a1717;--surface2:#221e1e;--surface3:#2d2828;
  --border:rgba(255,255,255,0.055);--border-md:rgba(255,255,255,0.09);--border-hi:rgba(255,255,255,0.15);
  --text:#f2edec;--text-2:#8c8486;--text-3:#4a4244;
  --accent:#e63946;--accent2:#ff6b6b;--accent-dim:rgba(230,57,70,0.13);--accent-glow:rgba(230,57,70,0.25);--red-deep:#c1121f;
  --topbar-bg:rgba(13,12,12,0.84);
  --user-bg:#1c1818;--r:14px;
}
:root.light-theme{
  --bg:#f7f7f8;--sidebar:#ffffff;--surface:#ffffff;--surface2:#ececf1;--surface3:#d9d9e3;
  --bg:#ffffff;--sidebar:rgba(247, 247, 248, 0.85);--surface:#ffffff;--surface2:#f2f2f7;--surface3:#e5e5ea;
  --border:rgba(0,0,0,0.08);--border-md:rgba(0,0,0,0.12);--border-hi:rgba(0,0,0,0.2);
  --text:#202123;--text-2:#565869;--text-3:#8e8ea0;
  --accent2:#c1121f;--accent-dim:rgba(230,57,70,0.07);--accent-glow:rgba(230,57,70,0.15);--red-deep:#9b0000;
  --topbar-bg:rgba(247,247,248,0.85);
  --topbar-bg:rgba(255,255,255,0.85);
  --user-bg:#ffffff;
}

/* Adjust background glow for light mode */
:root.light-theme body::before { opacity: 0.4; }

html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.65;overflow:hidden}
body::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 65% 45% at 12% 18%,rgba(230,57,70,0.07) 0%,transparent 60%),
    radial-gradient(ellipse 50% 35% at 88% 82%,rgba(193,18,31,0.05) 0%,transparent 55%),
    radial-gradient(ellipse 40% 55% at 50% 45%,rgba(230,57,70,0.03) 0%,transparent 70%);
  pointer-events:none;z-index:0;
}
#layout{display:flex;height:100vh;overflow:hidden;position:relative;z-index:1}

/* SIDEBAR */
#sidebar{
  width:268px;flex-shrink:0;background:var(--sidebar);border-right:1px solid var(--border);
  width:268px;flex-shrink:0;background:var(--sidebar);
  backdrop-filter: blur(20px); border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  transition:width .3s cubic-bezier(.4,0,.2,1),opacity .3s ease;
  overflow:hidden;position:relative;
}
#sidebar::after{
  content:'';position:absolute;top:0;right:0;width:1px;height:100%;
  background:linear-gradient(to bottom,transparent,rgba(230,57,70,0.18) 40%,rgba(230,57,70,0.09) 72%,transparent);
  pointer-events:none;
}
#sidebar.collapsed{width:0;opacity:0;pointer-events:none}
#sidebar-top{padding:16px 12px 10px;display:flex;flex-direction:column;gap:6px}

/* SIDEBAR LOGO HEADER */
#sidebar-logo{
  display:flex;align-items:center;gap:10px;padding:8px 6px 14px;
  border-bottom:1px solid var(--border);margin-bottom:4px;
}
#sidebar-logo img{
  width:34px;height:34px;border-radius:9px;object-fit:cover;
  box-shadow:0 0 10px rgba(230,57,70,0.35);flex-shrink:0;
}
#sidebar-logo-name{
  font-family:'Instrument Serif',serif;font-style:italic;font-size:20px;
  background:linear-gradient(125deg,var(--text) 20%,#e63946 70%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1;
}
#sidebar-logo-ver{font-size:11px;color:var(--text-3);font-weight:300;margin-left:1px}

#new-chat-btn{
  display:flex;align-items:center;gap:9px;padding:10px 13px;border-radius:10px;
  background:transparent;border:1px solid var(--border-md);color:var(--text);cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:13.5px;font-weight:500;
  transition:background .2s,border-color .2s,box-shadow .2s;white-space:nowrap;
}
#new-chat-btn:hover{background:var(--surface2);border-color:rgba(230,57,70,0.32);box-shadow:0 0 0 1px var(--accent-dim)}
#new-chat-btn svg{flex-shrink:0;opacity:.6}
.sidebar-label{font-size:10.5px;font-weight:500;letter-spacing:.1em;color:var(--text-3);text-transform:uppercase;padding:16px 16px 5px}
#history-list {
  flex: 1;           /* ← add this */
  overflow-y: auto;  /* ← add this */
  min-height: 0;     /* ← critical for flex shrink to work */
}

#history-list::-webkit-scrollbar {
  width: 5px;
}
#history-list::-webkit-scrollbar-thumb {
  background: var(--border-hi);
  border-radius: 10px;
}
#history-list::-webkit-scrollbar-thumb:hover {
  background: var(--accent);
}

/* CHAT ITEM */
.chat-item{
  display:flex;align-items:center;border-radius:10px;font-size:13px;color:var(--text-2);
  margin:1px 6px;position:relative;transition:background .15s,color .15s;
}
.chat-item::before{
  content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);
  width:2.5px;height:0;background:var(--accent);border-radius:2px;
  transition:height .2s ease;z-index:1;
}
.chat-item:hover{background:var(--surface);color:var(--text)}
.chat-item:hover::before{height:14px}
.chat-item.active{background:var(--surface2);color:var(--text)}
.chat-item.active::before{height:18px}
.chat-label{
  flex:1;padding:9px 4px 9px 13px;cursor:pointer;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;
  outline:none;border-radius:6px;
}
.chat-label:focus{background:rgba(255,255,255,0.05);caret-color:var(--accent)}
.chat-dots{
  flex-shrink:0;width:26px;height:26px;border-radius:6px;margin-right:5px;
  background:none;border:none;cursor:pointer;color:var(--text-3);
  display:none;align-items:center;justify-content:center;
  transition:background .15s,color .15s;
}
.chat-item:hover .chat-dots,.chat-item.active .chat-dots{display:flex}
.chat-dots:hover{background:var(--surface3);color:var(--text-2)}

/* CONTEXT MENU */
.ctx-menu{
  position:fixed;z-index:9999;background:var(--surface2);
  border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:5px;min-width:188px;
  box-shadow:0 16px 48px rgba(0,0,0,0.65),0 2px 8px rgba(0,0,0,0.4),0 0 0 0.5px rgba(255,255,255,0.04);
  animation:ctxin .15s cubic-bezier(.22,1,.36,1);
}
@keyframes ctxin{from{opacity:0;transform:scale(.93) translateY(-6px)}to{opacity:1;transform:scale(1) translateY(0)}}
.ctx-item{
  display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;
  font-size:13px;font-weight:400;color:var(--text-2);cursor:pointer;
  transition:background .12s,color .12s;font-family:'DM Sans',sans-serif;white-space:nowrap;
}
.ctx-item:hover{background:var(--surface3);color:var(--text)}
.ctx-item svg{flex-shrink:0;opacity:.65}
.ctx-item:hover svg{opacity:.9}
.ctx-item.danger{color:#f87171}
.ctx-item.danger svg{opacity:.8;color:#f87171}
.ctx-item.danger:hover{background:rgba(230,57,70,0.14);color:#ff6b6b}
.ctx-sep{height:1px;background:var(--border);margin:4px 6px}

/* SIDEBAR BOTTOM */
#sidebar-bottom{margin-top:auto;padding:12px;border-top:1px solid var(--border);flex-shrink: 0;}
.user-row{display:flex;align-items:center;gap:10px;padding:10px 11px;border-radius:10px;cursor:pointer;transition:background .15s}
.user-row:hover{background:var(--surface)}
.avatar{
  width:33px;height:33px;border-radius:50%;
  background:conic-gradient(from 120deg,#e63946,#c1121f,#ff6b6b,#e63946);
  display:flex;align-items:center;justify-content:center;
  font-size:12.5px;font-weight:700;color:white;flex-shrink:0;
  box-shadow:0 0 12px rgba(230,57,70,0.38);
}
.user-info strong{display:block;font-size:13px;font-weight:500;color:var(--text)}
.user-info span{font-size:11.5px;color:var(--text-3)}
.user-meta{display:flex;align-items:center;justify-content:space-between;gap:10px}
.logout-btn{
  flex-shrink:0;border:1px solid var(--border-md);background:transparent;color:var(--text-2);
  border-radius:8px;padding:7px 10px;font-size:11.5px;font-family:'DM Sans',sans-serif;cursor:pointer;
  transition:background .15s,border-color .15s,color .15s;
}
.logout-btn:hover{background:var(--surface2);border-color:rgba(230,57,70,0.28);color:var(--text)}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;min-width:0;position:relative}
#topbar{
  height:56px;flex-shrink:0;display:flex;align-items:center;gap:10px;padding:0 20px;
  border-bottom:1px solid var(--border);background:var(--topbar-bg);
  backdrop-filter:blur(20px) saturate(1.4);position:relative;z-index:10;
}
#toggle-sidebar{width:34px;height:34px;border-radius:9px;background:none;border:none;cursor:pointer;color:var(--text-2);display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s}
#toggle-sidebar:hover{background:var(--surface);color:var(--text)}

/* TOPBAR MODEL PILL */
#model-pill{
  display:flex;align-items:center;gap:8px;padding:5px 14px 5px 6px;border-radius:10px;
  border:1px solid var(--border-md);background:var(--surface);cursor:pointer;font-size:13px;font-weight:500;
  transition:background .2s,border-color .2s;white-space:nowrap;position:relative;overflow:hidden;
}
#model-pill::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(230,57,70,0.07) 0%,transparent 60%);opacity:0;transition:opacity .2s}
#model-pill:hover{background:var(--surface2);border-color:rgba(230,57,70,0.28)}
#model-pill:hover::before{opacity:1}
#model-pill img{
  width:26px;height:26px;border-radius:6px;object-fit:cover;flex-shrink:0;
  box-shadow:0 0 8px rgba(230,57,70,0.3);
}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 2px var(--accent-dim),0 0 8px var(--accent-glow);animation:livepulse 2.4s ease-in-out infinite;flex-shrink:0}
@keyframes livepulse{0%,100%{box-shadow:0 0 0 2px var(--accent-dim),0 0 8px var(--accent-glow)}50%{box-shadow:0 0 0 4px rgba(230,57,70,0.07),0 0 16px rgba(230,57,70,0.42)}}
#topbar-right{margin-left:auto;display:flex;gap:6px;align-items:center}
.icon-btn{width:34px;height:34px;border-radius:9px;background:none;border:none;cursor:pointer;color:var(--text-2);display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s}
.icon-btn:hover{background:var(--surface);color:var(--text)}

/* MESSAGES */
#messages-wrap{flex:1;overflow-y:auto;position:relative}
#messages-wrap::-webkit-scrollbar{width:4px}
#messages-wrap::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:99px}
#messages{max-width:740px;margin:0 auto;padding:40px 28px 28px;display:flex;flex-direction:column;gap:0}

/* WELCOME */
#welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:64vh;text-align:center;gap:18px;padding:48px 24px}
.welcome-glow{position:relative;width:90px;height:90px;display:flex;align-items:center;justify-content:center;margin-bottom:4px}
.welcome-glow::before{content:'';position:absolute;inset:-18px;background:radial-gradient(circle,rgba(230,57,70,0.28) 0%,transparent 70%);border-radius:30px;animation:glowanim 3s ease-in-out infinite alternate}
@keyframes glowanim{from{opacity:.45;transform:scale(1)}to{opacity:1;transform:scale(1.25)}}
.welcome-orb{
  width:84px;height:84px;border-radius:22px;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 32px rgba(230,57,70,0.55),0 0 0 3px rgba(230,57,70,0.2),0 0 0 1px rgba(255,255,255,0.07);
  position:relative;z-index:1;background:var(--surface2);
}
.welcome-orb img{width:100%;height:100%;object-fit:cover;border-radius:22px}
#welcome-wordmark{font-family:'Instrument Serif',serif;font-style:italic;font-size:46px;letter-spacing:-.5px;line-height:1;background:linear-gradient(125deg,var(--text) 20%,#e63946 55%,#ff6b6b 80%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#welcome p{font-size:16px;color:var(--text-2);max-width:360px;line-height:1.75;font-weight:300}
.suggestion-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:500px;margin-top:12px}
.sug-card{background:var(--surface);border:1px solid var(--border-md);border-radius:var(--r);padding:15px 17px;text-align:left;cursor:pointer;transition:background .2s,border-color .25s,transform .25s,box-shadow .25s;position:relative;overflow:hidden}
.sug-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(230,57,70,0.07) 0%,transparent 60%);opacity:0;transition:opacity .25s}
.sug-card:hover{background:var(--surface2);border-color:rgba(230,57,70,0.24);transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,0.4),0 0 0 1px rgba(230,57,70,0.1)}
.sug-card:hover::before{opacity:1}
.sug-card strong{display:block;font-size:13.5px;font-weight:500;margin-bottom:4px;color:var(--text)}
.sug-card span{font-size:12.5px;color:var(--text-2);line-height:1.55}

/* MSG ROWS */
.msg-row{display:flex;gap:14px;padding:20px 0;position:relative;animation:msgfade .35s cubic-bezier(.22,1,.36,1) both}
.msg-row:not(:last-child)::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(to right,transparent 0%,var(--border) 20%,var(--border) 80%,transparent 100%)}
@keyframes msgfade{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.msg-row.user .msg-icon{order:2}
.msg-row.user .msg-body{order:1;align-items:flex-end}
.msg-icon{width:34px;height:34px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:2px;transition:transform .2s;overflow:hidden}
.msg-row:hover .msg-icon{transform:scale(1.05)}
.msg-icon.ai-icon{
  background:var(--surface2);border:1px solid var(--border-md);
  box-shadow:0 2px 8px rgba(0,0,0,0.3),0 0 0 1px rgba(230,57,70,0.07);padding:0;
}
.msg-icon.ai-icon img{width:100%;height:100%;object-fit:cover;border-radius:9px}
.msg-icon.user-icon{background:conic-gradient(from 120deg,#e63946,#c1121f,#ff6b6b,#e63946);color:white;font-weight:600;font-size:13px;box-shadow:0 2px 8px rgba(230,57,70,0.3)}
.msg-body{display:flex;flex-direction:column;flex:1;gap:5px;min-width:0}
.msg-sender{font-size:12px;font-weight:500;color:var(--text-3);letter-spacing:.04em;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.msg-sender img{width:13px;height:13px;border-radius:3px;object-fit:cover;opacity:.6}
.msg-content{font-size:15px;line-height:1.75;color:var(--text);word-break:break-word}
.msg-row.user .msg-content{background:var(--user-bg);border:1px solid var(--border-md);border-radius:16px 16px 4px 16px;padding:12px 17px;display:inline-block;max-width:86%;transition:border-color .2s}
.msg-row.user:hover .msg-content{border-color:var(--border-hi)}
.msg-time{font-size:11px;color:var(--text-3);opacity:0;transition:opacity .2s}
.msg-row:hover .msg-time{opacity:1}
.typing-dots{display:flex;gap:5px;align-items:center;padding:6px 0}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--accent);opacity:.4;animation:tdot 1.4s ease-in-out infinite}
.typing-dots span:nth-child(2){animation-delay:.16s}
.typing-dots span:nth-child(3){animation-delay:.32s}
@keyframes tdot{0%,60%,100%{transform:translateY(0);opacity:.35}30%{transform:translateY(-6px);opacity:1}}
.msg-actions{display:flex;gap:4px;margin-top:2px;opacity:0;transform:translateY(4px);transition:opacity .2s,transform .2s}
.msg-row:hover .msg-actions{opacity:1;transform:translateY(0)}
.act-btn{display:flex;align-items:center;gap:5px;padding:4px 8px;border-radius:6px;background:none;border:none;cursor:pointer;color:var(--text-3);font-size:11.5px;font-family:'DM Sans',sans-serif;transition:background .15s,color .15s}
.act-btn:hover{background:var(--surface);color:var(--text-2)}
.act-btn.copied{color:var(--accent2)}

/* INPUT */
#input-zone{padding:14px 24px 22px;background:var(--bg);flex-shrink:0}
#input-box{max-width:740px;margin:0 auto;background:var(--surface);border:1px solid var(--border-md);border-radius:18px;padding:14px 14px 10px;display:flex;flex-direction:column;gap:10px;position:relative;overflow:hidden;transition:border-color .25s,box-shadow .25s}
#input-box::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(230,57,70,0.05) 0%,transparent 50%);opacity:0;transition:opacity .3s;pointer-events:none}
#input-box:focus-within{border-color:rgba(230,57,70,0.4);box-shadow:0 0 0 3px rgba(230,57,70,0.1),0 8px 32px rgba(0,0,0,0.35)}
#input-box:focus-within::before{opacity:1}
#msg-input{background:none;border:none;outline:none;resize:none;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);line-height:1.65;min-height:24px;max-height:200px;overflow-y:auto;width:100%;font-weight:300}
#msg-input::placeholder{color:var(--text-3)}
#input-row{display:flex;align-items:center;gap:8px}
.input-action{width:30px;height:30px;border-radius:8px;background:none;border:1px solid var(--border);color:var(--text-3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,border-color .15s,color .15s;flex-shrink:0}
.input-action:hover{background:var(--surface2);border-color:var(--border-md);color:var(--text-2)}
.input-sep{width:1px;height:18px;background:var(--border);margin:0 2px}
#send-btn{margin-left:auto;width:34px;height:34px;border-radius:10px;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s,transform .2s,box-shadow .2s;flex-shrink:0;box-shadow:0 2px 10px rgba(230,57,70,0.35),inset 0 1px 0 rgba(255,255,255,0.14)}
#send-btn:hover:not(:disabled){background:var(--red-deep);transform:scale(1.07) translateY(-1px);box-shadow:0 6px 20px rgba(230,57,70,0.5),inset 0 1px 0 rgba(255,255,255,0.14)}
#send-btn:active:not(:disabled){transform:scale(.93)}
#send-btn:disabled{background:var(--surface2);box-shadow:none;cursor:not-allowed;opacity:.4}
#char-hint{font-size:11.5px;color:var(--text-3);text-align:center;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:6px}
#char-hint img{width:13px;height:13px;border-radius:3px;object-fit:cover;opacity:.45}

#scroll-btn{
  position:absolute;bottom:22px;right:22px;width:36px;height:36px;border-radius:50%;
  background:var(--surface2);border:1px solid var(--border-md);color:var(--text-2);
  cursor:pointer;display:none;align-items:center;justify-content:center;
  box-shadow:0 4px 18px rgba(0,0,0,0.45);transition:background .15s,transform .2s;z-index:5
}
#scroll-btn:hover{background:var(--surface3);transform:scale(1.08)}
#scroll-btn.show{display:flex}

.toast{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(10px);
  background:var(--surface2);border:1px solid var(--border-md);border-radius:10px;
  padding:8px 16px;font-size:13px;color:var(--text-2);
  opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;z-index:9999;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:640px){#sidebar{display:none}#messages{padding:22px 14px 18px}.suggestion-grid{grid-template-columns:1fr}#input-zone{padding:10px 12px 16px}}
</style>
</head>

const messagesEl   = document.getElementById('messages');
const messagesWrap = document.getElementById('messages-wrap');
const inputEl      = document.getElementById('msg-input');
const sendBtn      = document.getElementById('send-btn');
const historyList  = document.getElementById('history-list');
const ctxMenu      = document.getElementById('ctx-menu');
const scrollBtn    = document.getElementById('scroll-btn');
const userAvatarEl = document.getElementById('user-avatar');
const userNameEl   = document.getElementById('user-name');
const userEmailEl  = document.getElementById('user-email');
const logoutBtnEl  = document.getElementById('logout-btn');

let chats = {}; // Initialize empty to prevent cross-user leakage
let currentChatId = localStorage.getItem("drave_current") || null;
let sending = false;
let ctxTargetId = null;
let currentUser = getStoredUser();

syncAuthUI();
fetchUserChats(); // This will populate chats and call render/load


function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('collapsed');
}

function getStoredUser(){
  try{
    return JSON.parse(localStorage.getItem("user") || "null");
  }catch{
    return null;
  }
}

function getInitials(name){
  if(!name) return "U";
  const parts = name.trim().split(/\s+/).filter(Boolean);
  return parts.slice(0,2).map(part => part[0].toUpperCase()).join("") || "U";
}

function syncAuthUI(){
  currentUser = getStoredUser();
  const token = localStorage.getItem("token");

  if(currentUser && token){
    userAvatarEl.textContent = getInitials(currentUser.name);
    userNameEl.textContent = currentUser.name || "User";
    userEmailEl.textContent = currentUser.email || "Signed in";
    logoutBtnEl.style.display = "inline-flex";
  }else{
    userAvatarEl.textContent = "U";
    userNameEl.textContent = "Guest";
    userEmailEl.textContent = "Sign in from auth.html";
    logoutBtnEl.style.display = "none";
  }
}

function logoutUser(){
  localStorage.removeItem("token");
  localStorage.removeItem("user");
  localStorage.removeItem("drave_chats");
  localStorage.removeItem("drave_current");
  syncAuthUI();
  showToast("Logged out");
  setTimeout(() => {
    window.location.href = "auth.html";
  }, 500);
}

function suggest(card){
  const span = card.querySelector('span');
  if(!span) return;
  inputEl.value = span.textContent;
  autoResize();
  sendBtn.disabled = false;
  inputEl.focus();
}

function showWelcome(){
  if(document.getElementById('welcome')) return;
  const w = document.createElement('div');
  w.id = 'welcome';
  w.innerHTML = `
    <div class="welcome-glow">
      <div class="welcome-orb"><img src="${LOGO}" alt="Drave"/></div>
    </div>
    <div id="welcome-wordmark">Drave</div>
    <p>Your intelligent assistant — thoughtful, warm, and always ready to help.</p>
    <div class="suggestion-grid">
      <div class="sug-card" onclick="suggest(this)"><strong>✦ Explain a concept</strong><span>Break down quantum computing in simple terms</span></div>
      <div class="sug-card" onclick="suggest(this)"><strong>✦ Write something</strong><span>Draft a professional email to a client</span></div>
      <div class="sug-card" onclick="suggest(this)"><strong>✦ Help with code</strong><span>Debug my Python function and optimize it</span></div>
      <div class="sug-card" onclick="suggest(this)"><strong>🎨 Generate image</strong><span>Generate an image of a futuristic city at sunset</span></div>
    </div>`;
  messagesEl.prepend(w);
}

function hideWelcome(){
  const w = document.getElementById('welcome');
  if(w) w.remove();
}

function autoResize(){
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 200) + 'px';
}

inputEl.addEventListener("input", ()=>{
  autoResize();
  sendBtn.disabled = !inputEl.value.trim() || sending;
});

messagesWrap.addEventListener('scroll', ()=>{
  const distFromBottom = messagesWrap.scrollHeight - messagesWrap.scrollTop - messagesWrap.clientHeight;
  scrollBtn.classList.toggle('show', distFromBottom > 120);
});

async function fetchUserChats() {
  const token = localStorage.getItem("token");
  if (!token) {
    showWelcome();
    return;
  }
  try {
    const res = await fetch("http://localhost:5000/chats", {
      headers: { "Authorization": `Bearer ${token}` }
    });
    const chatIds = await res.json();
    
    chats = {};

    // Fetch history for each chat ID to populate sidebar labels immediately
    await Promise.all(chatIds.map(async (id) => {
      const hRes = await fetch(`http://localhost:5000/history/${id}`, {
        headers: { "Authorization": `Bearer ${token}` }
      });
      if (hRes.ok) {
        chats[id] = await hRes.json();
      } else {
        chats[id] = [];
      }
    }));

    // Ensure currentChatId belongs to the current user
    if (currentChatId && !chats[currentChatId]) {
        currentChatId = chatIds.length > 0 ? chatIds[0] : null;
    }

    localStorage.setItem("drave_chats", JSON.stringify(chats));
    loadChats();
    
    if (currentChatId) {
        renderChat(); // Render history that was just fetched
    } else {
        showWelcome();
    }
  } catch (err) { console.error(err); }
}

function now(){
  return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

function loadChats(){
  historyList.innerHTML = "";
  Object.keys(chats).reverse().forEach(id => {
    const msgs = chats[id];
    const label = msgs.find(m => m.role === 'user')?.text || "New Chat";
    const item = document.createElement("div");
    item.className = "chat-item" + (id === currentChatId ? " active" : "");
    item.dataset.id = id;
    item.innerHTML = `
      <div class="chat-label">${escHtml(label.slice(0,30))}</div>
      <button class="chat-dots" title="More options">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/>
        </svg>
      </button>`;
    item.querySelector('.chat-label').onclick = () => switchChat(id);
    item.querySelector('.chat-dots').onclick = (e) => {
      e.stopPropagation();
      showCtxMenu(e, id);
    };
    historyList.appendChild(item);
  });
}

async function switchChat(id){
  currentChatId = id;
  localStorage.setItem("drave_current", id);

  // Fetch history from server to ensure privacy and cross-device sync
  const token = localStorage.getItem("token");
  if (token) {
    try {
      const res = await fetch(`http://localhost:5000/history/${id}`, {
        headers: { "Authorization": `Bearer ${token}` }
      });
      if (res.ok) {
        const history = await res.json();
        document.getElementById("typing")?.remove();
        chats[id] = history;
        localStorage.setItem("drave_chats", JSON.stringify(chats));
        renderChat();
        loadChats();
      }
    } catch (err) { console.error("History sync error:", err); }
  }
}

function renderChat(){
  messagesEl.innerHTML = "";
  if(!currentChatId || !chats[currentChatId] || chats[currentChatId].length === 0){
    showWelcome();
    return;
  }
  chats[currentChatId].forEach(msg => {
    if(msg.type === 'image') {
      addImageMsg(msg.imageUrl, msg.prompt, false);
    } else {
      addMsg(msg.text, msg.role, false);
    }
  });
  scrollToBottom();
}

function newChat(){
  currentChatId = "chat_" + Date.now();
  chats[currentChatId] = [];
  localStorage.setItem("drave_chats", JSON.stringify(chats));
  localStorage.setItem("drave_current", currentChatId);
  messagesEl.innerHTML = "";
  showWelcome();
  loadChats();
}

function aiIconHtml(){
  return `<div class="msg-icon ai-icon"><img src="${LOGO}" alt="Drave"/></div>`;
}

function addMsg(text, role, animate = true){
  hideWelcome();
  const row = document.createElement('div');
  row.className = `msg-row ${role}`;
  row.dataset.text = text;

  const actionsHtml = role === 'ai'
    ? `<div class="msg-actions">
        <button class="act-btn" onclick="copyMsg(this)">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copy
        </button>
        <button class="act-btn" onclick="regen()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>
          Regenerate
        </button>
      </div>`
    : `<div class="msg-actions">
        <button class="act-btn" onclick="copyMsg(this)">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copy
        </button>
      </div>`;

  const senderHtml = role === 'ai'
    ? `<div class="msg-sender"><img src="${LOGO}" alt=""/>Drave</div>`
    : `<div class="msg-sender">You</div>`;

  const iconHtml = role === 'ai'
    ? aiIconHtml()
    : `<div class="msg-icon user-icon">U</div>`;

  row.innerHTML = `
    ${iconHtml}
    <div class="msg-body">
      ${senderHtml}
      <div class="msg-content">${formatText(text)}</div>
      <div class="msg-time">${now()}</div>
      ${actionsHtml}
    </div>`;

  messagesEl.appendChild(row);
}

// =========================
// IMAGE MESSAGE RENDERER  ✨ NEW
// =========================
function addImageMsg(imageUrl, prompt = "", animate = true) {
  hideWelcome();
  const fullUrl = imageUrl.startsWith("http") ? imageUrl : `http://localhost:5000${imageUrl}`;

  const row = document.createElement('div');
  row.className = 'msg-row ai';
  row.innerHTML = `
    ${aiIconHtml()}
    <div class="msg-body">
      <div class="msg-sender"><img src="${LOGO}" alt=""/>Drave</div>
      <div class="msg-content img-msg-content">
        <div class="img-caption">🎨 Generated image${prompt ? ` for: <em>${escHtml(prompt)}</em>` : ''}</div>
        <div class="img-wrapper">
          <img
            class="generated-img"
            src="${fullUrl}"
            alt="Generated image"
            onerror="this.parentElement.innerHTML='<span style=\'color:var(--danger,#f66)\'>⚠️ Image failed to load</span>'"
          />
          <div class="img-overlay">
            <a class="act-btn img-dl-btn" href="${fullUrl}" download title="Download image">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              Download
            </a>
          </div>
        </div>
      </div>
      <div class="msg-time">${now()}</div>
    </div>`;

  messagesEl.appendChild(row);
  scrollToBottom();
}

// =========================
// DETECT IMAGE INTENT  ✨ NEW
// =========================
const IMAGE_TRIGGERS = [
  /^generate\s+(an?\s+)?image\s+of\b/i,
  /^create\s+(an?\s+)?image\s+of\b/i,
  /^draw\s+(an?\s+)?image\s+of\b/i,
  /^make\s+(an?\s+)?image\s+of\b/i,
  /^show\s+me\s+(an?\s+)?image\s+of\b/i,
  /^paint\s+(an?\s+)?image\s+of\b/i,
  /^generate\s+(an?\s+)?picture\s+of\b/i,
  /^create\s+(an?\s+)?picture\s+of\b/i,
  /\bgenerate\s+image\b/i,
  /\bcreate\s+image\b/i,
  /\bimage\s+of\b/i,
];

function isImageRequest(text) {
  return IMAGE_TRIGGERS.some(re => re.test(text.trim()));
}

// Strip intent prefix to get a clean Imagen prompt
// e.g. "Generate an image of a sunset" → "a sunset"
function extractImagePrompt(text) {
  return text
    .replace(/^(generate|create|draw|make|show me|paint)\s+(an?\s+)?(image|picture)\s+(of\s+)?/i, '')
    .replace(/^(generate|create)\s+image\s*(of\s+)?/i, '')
    .trim() || text.trim();
}

function addTyping(){
  const row = document.createElement('div');
  row.className = 'msg-row ai';
  row.id = "typing";
  row.innerHTML = `
    ${aiIconHtml()}
    <div class="msg-body">
      <div class="msg-sender"><img src="${LOGO}" alt=""/>Drave</div>
      <div class="msg-content">
        <div class="typing-dots"><span></span><span></span><span></span></div>
      </div>
    </div>`;
  messagesEl.appendChild(row);
  scrollToBottom();
}

// Typing indicator with a custom label  ✨ NEW
function addTypingWithLabel(label = "Thinking…") {
  const row = document.createElement('div');
  row.className = 'msg-row ai';
  row.id = "typing";
  row.innerHTML = `
    ${aiIconHtml()}
    <div class="msg-body">
      <div class="msg-sender"><img src="${LOGO}" alt=""/>Drave</div>
      <div class="msg-content">
        <div class="typing-dots"><span></span><span></span><span></span></div>
        <span style="font-size:12px;opacity:.6;margin-left:6px">${escHtml(label)}</span>
      </div>
    </div>`;
  messagesEl.appendChild(row);
  scrollToBottom();
}

function copyMsg(btn){
  const text = btn.closest('.msg-row').dataset.text;
  navigator.clipboard.writeText(text).then(()=>{
    btn.classList.add('copied');
    btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Copied`;
    setTimeout(()=>{
      btn.classList.remove('copied');
      btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy`;
    }, 1800);
  });
}

function regen(){
  showToast("Regenerate requires a connected backend.");
}

function formatText(text){
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/`([^`]+)`/g,'<code style="background:var(--surface2);padding:1px 5px;border-radius:4px;font-size:13px">$1</code>')
    .replace(/\n/g,"<br>");
}

function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
function escAttr(s){ return s.replace(/'/g,"&#39;").replace(/"/g,'&quot;').replace(/\n/g,' ') }

// =========================
// SEND MESSAGE (updated)  ✨
// =========================
async function sendMessage(){
  const text = inputEl.value.trim();
  if(!text || sending) return;

  if(!currentChatId || !chats[currentChatId]){
    currentChatId = "chat_" + Date.now();
    chats[currentChatId] = [];
    localStorage.setItem("drave_current", currentChatId);
  }

  sending = true;
  sendBtn.disabled = true;
  hideWelcome();

  addMsg(text, "user");
  inputEl.value = "";
  inputEl.style.height = 'auto';

  chats[currentChatId].push({role:"user", text});
  localStorage.setItem("drave_chats", JSON.stringify(chats));
  loadChats();

  // ── Image generation path ✨ ──────────────────────────────────────────────
  if(isImageRequest(text)){
    const imagePrompt = extractImagePrompt(text);
    addTypingWithLabel("Generating image…");

    try {
      const res = await fetch("http://localhost:5000/generate-image", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          prompt: imagePrompt,
          chatId: currentChatId,
          numberOfImages: 1,
          aspectRatio: "1:1"
        })
      });

      const data = await res.json();
      document.getElementById("typing")?.remove();

      if(data.images && data.images.length > 0){
        data.images.forEach(img => {
          addImageMsg(img.url, imagePrompt);
          // Persist in local chat history
          chats[currentChatId].push({
            role: "ai",
            type: "image",
            imageUrl: img.url,
            prompt: imagePrompt,
            text: `🖼️ Generated: ${imagePrompt}`
          });
        });
      } else {
        const errMsg = data.error || "⚠️ Image generation returned no results.";
        addMsg(errMsg, "ai");
        chats[currentChatId].push({role:"ai", text: errMsg});
      }

    } catch(err) {
      document.getElementById("typing")?.remove();
      const errMsg = "❌ Could not reach backend for image generation.";
      addMsg(errMsg, "ai");
      chats[currentChatId].push({role:"ai", text: errMsg});
      console.error(err);
    }

  // ── Normal chat path ─────────────────────────────────────────────────────
  } else {
    addTyping();

    try{
      const token = localStorage.getItem("token");
      const res = await fetch("http://localhost:5000/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${token}`
        },
        body: JSON.stringify({
          message: text,
          chatId: currentChatId,
          history: chats[currentChatId]
        })
      });

      const data = await res.json();
      document.getElementById("typing")?.remove();

      const reply = data.reply || "⚠ No reply from server.";
      addMsg(reply, "ai");
      chats[currentChatId].push({role:"ai", text: reply});

    } catch(err){
      document.getElementById("typing")?.remove();
      addMsg("❌ Could not reach backend. Make sure your server is running on port 5000.", "ai");
      console.error(err);
    }
  }

  localStorage.setItem("drave_chats", JSON.stringify(chats));
  loadChats();

  sending = false;
  sendBtn.disabled = !inputEl.value.trim();
  scrollToBottom();
}

inputEl.addEventListener("keydown", (e)=>{
  if(e.key==="Enter" && !e.shiftKey){
    e.preventDefault();
    sendMessage();
  }
});

document.getElementById("upload-btn").onclick = ()=> document.getElementById("fileInput").click();

document.getElementById("fileInput").addEventListener("change", async (e)=>{
  const file = e.target.files[0];
  if(!file) return;

  if(!currentChatId || !chats[currentChatId]){
    currentChatId = "chat_" + Date.now();
    chats[currentChatId] = [];
  }

  const formData = new FormData();
  formData.append("file", file);
  formData.append("chatId", currentChatId);

  hideWelcome();
  addMsg(`📎 ${file.name}`, "user");

  try{
    const token = localStorage.getItem("token");
    const res = await fetch("http://localhost:5000/upload", {
      method: "POST",
      headers: { "Authorization": `Bearer ${token}` },
      body: formData
    });
    const data = await res.json();
    addMsg(data.reply || "File uploaded.", "ai");
  } catch{
    addMsg("❌ Upload failed — backend not reachable.", "ai");
  }

  e.target.value = "";
});

function showCtxMenu(e, id){
  ctxTargetId = id;
  ctxMenu.style.display = 'block';
  const x = Math.min(e.clientX, window.innerWidth - 200);
  const y = Math.min(e.clientY, window.innerHeight - 180);
  ctxMenu.style.left = x + 'px';
  ctxMenu.style.top  = y + 'px';
  e.stopPropagation();
}

document.addEventListener('click', ()=>{
  ctxMenu.style.display = 'none';
  ctxTargetId = null;
});

document.getElementById('ctx-star').onclick = ()=>{
  showToast("⭐ Starred");
  ctxMenu.style.display = 'none';
};

document.getElementById('ctx-rename').onclick = ()=>{
  if(!ctxTargetId) return;
  const newName = prompt("Rename conversation:", chats[ctxTargetId]?.[0]?.text?.slice(0,30) || "New Chat");
  if(newName && newName.trim()){
    if(chats[ctxTargetId].length === 0) chats[ctxTargetId].push({role:'label', text: newName.trim()});
    else chats[ctxTargetId][0].text = newName.trim();
    localStorage.setItem("drave_chats", JSON.stringify(chats));
    loadChats();
  }
  ctxMenu.style.display = 'none';
};

document.getElementById('ctx-project').onclick = ()=>{
  showToast("Added to project");
  ctxMenu.style.display = 'none';
};

document.getElementById('ctx-delete').onclick = ()=>{
  if(!ctxTargetId) return;
  delete chats[ctxTargetId];
  if(currentChatId === ctxTargetId){
    currentChatId = null;
    localStorage.removeItem("drave_current");
    messagesEl.innerHTML = "";
    showWelcome();
  }
  localStorage.setItem("drave_chats", JSON.stringify(chats));
  loadChats();
  ctxMenu.style.display = 'none';
};

function scrollToBottom(){
  messagesWrap.scrollTo({top: messagesWrap.scrollHeight, behavior:'smooth'});
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=> t.classList.remove('show'), 2200);
}

async function shareChat(){
  if(!currentChatId || !chats[currentChatId] || chats[currentChatId].length === 0){
    showToast("No messages to share");
    return;
  }
  
  const token = localStorage.getItem("token");
  if(!token){
    showToast("Please sign in to share chats");
    return;
  }

  showToast("Preparing export...");

  try {
    const res = await fetch(`http://localhost:5000/download-chat/${currentChatId}`, {
      headers: { "Authorization": `Bearer ${token}` }
    });

    if (!res.ok) {
      const data = await res.json();
      throw new Error(data.error || "Export failed");
    }

    const blob = await res.blob();
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `drave-chat-${currentChatId.slice(0, 8)}.txt`;
    document.body.appendChild(a);
    a.click();
    window.URL.revokeObjectURL(url);
    a.remove();
    showToast("Chat exported successfully! 📁");
  } catch (err) {
    console.error(err);
    showToast("❌ " + err.message);
  }
}

if(!currentChatId || !chats[currentChatId] || chats[currentChatId].length === 0){
  showWelcome();
}
</script>
