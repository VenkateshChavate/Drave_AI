<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Drave — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0d0c0c;
  --surface:#1a1717;
  --surface2:#221e1e;
  --surface3:#2d2828;
  --border:rgba(255,255,255,0.055);
  --border-md:rgba(255,255,255,0.09);
  --border-hi:rgba(255,255,255,0.18);
  --text:#f2edec;
  --text-2:#8c8486;
  --text-3:#4a4244;
  --accent:#e63946;
  --accent2:#ff6b6b;
  --accent-dim:rgba(230,57,70,0.13);
  --accent-glow:rgba(230,57,70,0.3);
  --red-deep:#c1121f;
  --r:16px;
  --input-h:52px;
}

:root.light-theme{
  --bg:#f9f9f9;
  --surface:#ffffff;
  --surface2:#f3f3f3;
  --surface3:#e5e5e5;
  --border:rgba(0,0,0,0.06);
  --border-md:rgba(0,0,0,0.1);
  --border-hi:rgba(0,0,0,0.2);
  --text:#1a1717;
  --text-2:#4a4244;
  --text-3:#8c8486;
  --accent2:#c1121f;
  --accent-dim:rgba(230,57,70,0.1);
  --accent-glow:rgba(230,57,70,0.2);
  --red-deep:#9b0000;
}

html,body{
  height:100%;
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  font-size:15px;
  line-height:1.65;
  overflow:hidden;
}

/* ── BACKGROUND ─────────────────────────────────── */
.bg-canvas{
  position:fixed;inset:0;z-index:0;overflow:hidden;
}
.bg-canvas::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 70% 55% at 15% 20%,rgba(230,57,70,0.1) 0%,transparent 60%),
    radial-gradient(ellipse 55% 40% at 85% 80%,rgba(193,18,31,0.07) 0%,transparent 55%),
    radial-gradient(ellipse 40% 60% at 50% 50%,rgba(230,57,70,0.04) 0%,transparent 70%);
}
.bg-grid{
  position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,0.018) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.018) 1px,transparent 1px);
  background-size:60px 60px;
  mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 0%,transparent 100%);
}
.bg-orb{
  position:absolute;
  border-radius:50%;
  filter:blur(80px);
  pointer-events:none;
  animation:orbFloat 8s ease-in-out infinite alternate;
}
.bg-orb-1{
  width:400px;height:400px;
  background:rgba(230,57,70,0.07);
  top:-100px;left:-100px;
}
.bg-orb-2{
  width:300px;height:300px;
  background:rgba(193,18,31,0.05);
  bottom:-80px;right:-80px;
  animation-delay:-4s;animation-duration:10s;
}
@keyframes orbFloat{
  from{transform:translate(0,0) scale(1)}
  to{transform:translate(30px,20px) scale(1.1)}
}

/* ── LAYOUT ─────────────────────────────────────── */
.page{
  position:relative;z-index:1;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.card{
  width:100%;max-width:440px;
  background:var(--surface);
  border:1px solid var(--border-md);
  border-radius:24px;
  padding:44px 44px 40px;
  position:relative;
  overflow:hidden;
  box-shadow:
    0 40px 80px rgba(0,0,0,0.55),
    0 0 0 0.5px rgba(255,255,255,0.04),
    inset 0 1px 0 rgba(255,255,255,0.06);
  animation:cardIn .55s cubic-bezier(.22,1,.36,1) both;
}
@keyframes cardIn{
  from{opacity:0;transform:translateY(28px) scale(.97)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
.card::before{
  content:'';
  position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(230,57,70,0.5) 40%,rgba(230,57,70,0.3) 60%,transparent);
}
.card::after{
  content:'';
  position:absolute;top:0;left:0;right:0;bottom:0;
  background:linear-gradient(145deg,rgba(230,57,70,0.04) 0%,transparent 50%);
  pointer-events:none;
}

/* ── LOGO ───────────────────────────────────────── */
.logo-wrap{
  display:flex;align-items:center;gap:12px;margin-bottom:32px;
  animation:fadeSlideUp .5s .1s both;
}
.logo-img{
  width:44px;height:44px;border-radius:12px;object-fit:cover;
  box-shadow:0 0 16px rgba(230,57,70,0.45),0 0 0 1px rgba(230,57,70,0.2);
}
.logo-text{
  font-family:'Instrument Serif',serif;
  font-style:italic;
  font-size:38px;
  letter-spacing:-.3px;
  background:linear-gradient(125deg,var(--text) 20%,#e63946 70%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
 
}
.logo-badge{
  font-size:10px;font-weight:500;letter-spacing:.08em;
  color:var(--accent2);background:var(--accent-dim);
  border:1px solid rgba(230,57,70,0.2);
  border-radius:4px;padding:2px 7px;margin-top:2px;
}

/* ── HEADINGS ───────────────────────────────────── */
.card-title{
  font-family:'Instrument Serif',serif;font-style:italic;
  font-size:30px;line-height:1.15;letter-spacing:-.3px;
  color:var(--text);margin-bottom:6px;
  animation:fadeSlideUp .5s .15s both;
}
.card-sub{
  font-size:14px;font-weight:300;color:var(--text-2);
  margin-bottom:32px;
  animation:fadeSlideUp .5s .2s both;
}

/* ── TAB SWITCHER ───────────────────────────────── */
.tabs{
  display:flex;gap:4px;background:var(--surface2);
  border:1px solid var(--border);border-radius:12px;
  padding:4px;margin-bottom:28px;
  animation:fadeSlideUp .5s .22s both;
}
.tab-btn{
  flex:1;padding:9px 16px;border:none;border-radius:9px;
  background:transparent;color:var(--text-3);font-family:'DM Sans',sans-serif;
  font-size:13.5px;font-weight:500;cursor:pointer;
  transition:background .2s,color .2s,box-shadow .2s;white-space:nowrap;
}
.tab-btn.active{
  background:var(--surface3);color:var(--text);
  box-shadow:0 1px 4px rgba(0,0,0,0.3),0 0 0 1px rgba(255,255,255,0.06);
}
.tab-btn:hover:not(.active){color:var(--text-2)}

/* ── FORM ───────────────────────────────────────── */
.form-section{display:none}
.form-section.active{display:block;animation:sectionIn .3s cubic-bezier(.22,1,.36,1) both}
@keyframes sectionIn{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:translateX(0)}}

.field{
  margin-bottom:16px;
  animation:fadeSlideUp .45s both;
}
.field:nth-child(1){animation-delay:.25s}
.field:nth-child(2){animation-delay:.3s}
.field:nth-child(3){animation-delay:.35s}
.field:nth-child(4){animation-delay:.4s}

.field-label{
  display:block;font-size:12.5px;font-weight:500;letter-spacing:.04em;
  color:var(--text-2);margin-bottom:7px;
}
.field-wrap{
  position:relative;display:flex;align-items:center;
}
.field-icon{
  position:absolute;left:15px;
  color:var(--text-3);pointer-events:none;
  transition:color .2s;
  display:flex;align-items:center;
}
.field-input{
  width:100%;height:var(--input-h);
  background:var(--surface2);
  border:1.5px solid var(--border-md);
  border-radius:12px;
  padding:0 16px 0 44px;
  font-family:'DM Sans',sans-serif;font-size:14.5px;font-weight:300;
  color:var(--text);outline:none;
  transition:border-color .2s,box-shadow .2s,background .2s;
}
.field-input::placeholder{color:var(--text-3);opacity:.75}
.field-input:focus{
  border-color:var(--accent);
  background:var(--surface);
  box-shadow:0 0 0 3px var(--accent-dim),0 4px 16px rgba(0,0,0,0.12);
}
.field-input:focus ~ .field-icon,
.field-wrap:focus-within .field-icon{color:var(--accent2)}
.field-icon{z-index:1}

/* light-theme overrides for inputs */
:root.light-theme .field-input:focus{
  box-shadow:0 0 0 3px var(--accent-dim),0 4px 16px rgba(0,0,0,0.06);
}

/* password toggle */
.toggle-pw{
  position:absolute;right:14px;background:none;border:none;cursor:pointer;
  color:var(--text-3);padding:4px;border-radius:6px;
  transition:color .15s,background .15s;display:flex;align-items:center;
}
.toggle-pw:hover{color:var(--text-2);background:var(--surface3)}
.pw-input{padding-right:46px!important}

/* ── ERROR / SUCCESS ────────────────────────────── */
.field-err{
  font-size:12px;color:#f87171;margin-top:5px;
  display:none;align-items:center;gap:5px;
}
.field-err.show{display:flex}

/* ── ALERT BOX ──────────────────────────────────── */
.alert-box{
  border-radius:10px;padding:12px 15px;font-size:13px;
  align-items:flex-start;gap:10px;margin-bottom:18px;
  display:none;
  background:rgba(230,57,70,0.1);
  border:1px solid rgba(230,57,70,0.2);
  color:#f87171;
}
.alert-box.show{
  display:flex;
  animation:alertIn .3s ease both;
}
@keyframes alertIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

/* ── SUBMIT ─────────────────────────────────────── */
.submit-btn{
  width:100%;height:52px;border:none;border-radius:13px;
  background:linear-gradient(135deg,#e63946 0%,#c1121f 100%);
  color:white;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;
  letter-spacing:.02em;cursor:pointer;position:relative;overflow:hidden;
  box-shadow:0 4px 20px rgba(230,57,70,0.4),0 1px 0 rgba(255,255,255,0.15) inset;
  transition:transform .2s,box-shadow .2s;
  margin-top:6px;
  animation:fadeSlideUp .5s .45s both;
}
.submit-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.12) 0%,transparent 50%);
}
.submit-btn:hover:not(:disabled){
  transform:translateY(-2px);
  box-shadow:0 8px 28px rgba(230,57,70,0.55),0 1px 0 rgba(255,255,255,0.15) inset;
}
.submit-btn:active:not(:disabled){transform:translateY(0) scale(.98)}
.submit-btn:disabled{opacity:.6;cursor:not-allowed}
.submit-btn .btn-text{position:relative;z-index:1}
.submit-btn .spinner{
  display:none;position:relative;z-index:1;
  width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);
  border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;
  margin:0 auto;
}
@keyframes spin{to{transform:rotate(360deg)}}
.submit-btn.loading .btn-text{display:none}
.submit-btn.loading .spinner{display:block}

/* ── DIVIDER ────────────────────────────────────── */
.divider{
  display:flex;align-items:center;gap:12px;margin:20px 0;
  animation:fadeSlideUp .5s .5s both;
}
.divider-line{flex:1;height:1px;background:var(--border)}
.divider-text{font-size:12px;color:var(--text-3);white-space:nowrap}

/* ── FOOTER ─────────────────────────────────────── */
.card-footer{
  text-align:center;margin-top:20px;font-size:13px;color:var(--text-3);
  animation:fadeSlideUp .5s .55s both;
}
.card-footer a{color:var(--accent2);text-decoration:none;font-weight:500}
.card-footer a:hover{text-decoration:underline}

/* ── REMEMBER / FORGOT ──────────────────────────── */
.login-extras{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:6px;
  animation:fadeSlideUp .5s .38s both;
}
.remember-wrap{display:flex;align-items:center;gap:8px;cursor:pointer}
.remember-wrap input[type=checkbox]{
  width:16px;height:16px;accent-color:var(--accent);cursor:pointer;
}
.remember-wrap span{font-size:13px;color:var(--text-2);font-weight:300}
.forgot-link{font-size:13px;color:var(--accent2);text-decoration:none;font-weight:400}
.forgot-link:hover{text-decoration:underline}

/* ── STRENGTH BAR ───────────────────────────────── */
.strength-wrap{margin-top:8px;display:none}
.strength-wrap.visible{display:block}
.strength-bars{display:flex;gap:4px;margin-bottom:4px}
.s-bar{flex:1;height:3px;border-radius:2px;background:var(--surface3);transition:background .3s}
.strength-label{font-size:11px;color:var(--text-3)}

/* ── SUCCESS STATE ──────────────────────────────── */
.success-screen{
  display:none;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:20px 0;
}
.success-screen.show{display:flex;animation:sectionIn .4s cubic-bezier(.22,1,.36,1) both}
.success-icon{
  width:72px;height:72px;border-radius:50%;
  background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.25);
  display:flex;align-items:center;justify-content:center;margin-bottom:20px;
  animation:successPop .5s cubic-bezier(.22,1,.36,1) both;
}
@keyframes successPop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.success-icon svg{color:#4ade80}
.success-title{font-family:'Instrument Serif',serif;font-style:italic;font-size:26px;margin-bottom:8px}
.success-sub{font-size:14px;color:var(--text-2);font-weight:300;margin-bottom:28px}
.continue-btn{
  padding:13px 36px;border:none;border-radius:12px;
  background:linear-gradient(135deg,#e63946,#c1121f);
  color:white;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;
  cursor:pointer;transition:transform .2s,box-shadow .2s;
  box-shadow:0 4px 16px rgba(230,57,70,0.35);
}
.continue-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(230,57,70,0.5)}

@keyframes fadeSlideUp{
  from{opacity:0;transform:translateY(14px)}
  to{opacity:1;transform:translateY(0)}
}

/* ── THEME TOGGLE ───────────────────────────────── */
.icon-btn{
  width:34px;height:34px;border-radius:9px;background:none;border:none;cursor:pointer;
  color:var(--text-2);display:flex;align-items:center;justify-content:center;
  transition:background .15s,color .15s;
}
.icon-btn:hover{background:var(--surface);color:var(--text)}
.theme-toggle{
  position:fixed;top:16px;right:16px;z-index:10;
  background:var(--surface);border:1px solid var(--border-md);
}

/* Light theme tweaks */
:root.light-theme .card{
  box-shadow:0 40px 80px rgba(0,0,0,0.12),0 0 0 0.5px rgba(0,0,0,0.04),inset 0 1px 0 rgba(255,255,255,0.06);
}
:root.light-theme .bg-canvas::before{opacity:.35}
:root.light-theme .bg-grid{
  background-image:
    linear-gradient(rgba(0,0,0,0.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,0,0,0.04) 1px,transparent 1px);
}

/* ── RESPONSIVE ─────────────────────────────────── */
@media(max-width:480px){
  .card{padding:32px 24px 28px;border-radius:18px}
  .card-title{font-size:26px}
}
</style>
</head>

        <div class="logo-text">Drave</div>

    <h1 class="card-title" id="formTitle">Welcome back</h1>
    <p class="card-sub" id="formSub">Sign in to continue your conversations.</p>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
      <button class="tab-btn" onclick="switchTab('register')">Create Account</button>
    </div>

    <!-- Alert box -->
    <div class="alert-box" id="alertBox">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="alertText"></span>
    </div>

    <!-- ── LOGIN FORM ───────────────────────── -->
    <div class="form-section active" id="loginForm">

      <div class="field">
        <label class="field-label">Email address</label>
        <div class="field-wrap">
          <span class="field-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          </span>
          <input class="field-input" id="loginEmail" type="email" placeholder="you@example.com" autocomplete="email"/>
        </div>
      </div>

      <div class="field">
        <label class="field-label">Password</label>
        <div class="field-wrap">
          <span class="field-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </span>
          <input class="field-input pw-input" id="loginPassword" type="password" placeholder="Your password" autocomplete="current-password"/>
          <button type="button" class="toggle-pw" onclick="togglePw('loginPassword',this)" title="Show/hide password">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <div class="login-extras">
        <label class="remember-wrap">
          <input type="checkbox" id="rememberMe"/>
          <span>Remember me</span>
        </label>
        <a href="#" class="forgot-link" onclick="event.preventDefault()">Forgot password?</a>
      </div>

      <button class="submit-btn" id="loginBtn" onclick="handleLogin()">
        <span class="btn-text">Sign In</span>
        <div class="spinner"></div>
      </button>

      <div class="card-footer" style="margin-top:22px">
        Don't have an account? <a href="#" onclick="switchTabLink(event,'register')">Create one</a>
      </div>
    </div>

    <!-- ── REGISTER FORM ───────────────────── -->
    <div class="form-section" id="registerForm">

      <div class="field">
        <label class="field-label">Full name</label>
        <div class="field-wrap">
          <span class="field-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </span>
          <input class="field-input" id="regName" type="text" placeholder="Your full name" autocomplete="name"/>
        </div>
      </div>

      <div class="field">
        <label class="field-label">Email address</label>
        <div class="field-wrap">
          <span class="field-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          </span>
          <input class="field-input" id="regEmail" type="email" placeholder="you@example.com" autocomplete="email"/>
        </div>
      </div>

      <div class="field">
        <label class="field-label">Password</label>
        <div class="field-wrap">
          <span class="field-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </span>
          <input class="field-input pw-input" id="regPassword" type="password" placeholder="Create a strong password" autocomplete="new-password" oninput="checkStrength(this.value)"/>
          <button type="button" class="toggle-pw" onclick="togglePw('regPassword',this)" title="Show/hide">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <!-- Password strength bar -->
        <div class="strength-wrap" id="strengthWrap">
          <div class="strength-bars">
            <div class="s-bar" id="sb1"></div>
            <div class="s-bar" id="sb2"></div>
            <div class="s-bar" id="sb3"></div>
            <div class="s-bar" id="sb4"></div>
          </div>
          <div class="strength-label" id="strengthLabel">Weak</div>
        </div>
      </div>

      <button class="submit-btn" id="regBtn" onclick="handleRegister()">
        <span class="btn-text">Create Account</span>
        <div class="spinner"></div>
      </button>

      <div class="card-footer" style="margin-top:22px">
        Already have an account? <a href="#" onclick="switchTabLink(event,'login')">Sign in</a>
      </div>
    </div>

    <!-- ── SUCCESS ─────────────────────────── -->
    <div class="success-screen" id="successScreen">
      <div class="success-icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="success-title" id="successTitle">Account created!</div>
      <div class="success-sub" id="successSub">Welcome to Drave. You're all set.</div>
      <button class="continue-btn" onclick="window.location.href='index.html'">Continue to Drave &rarr;</button>
    </div>

  </div>
</div>

<script src="server.js"></script>
</body>
</html>
